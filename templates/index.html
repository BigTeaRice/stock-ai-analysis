<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 股票分析系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --background-color: #f5f6fa;
            --card-color: #ffffff;
            --text-color: #2d3436;
            --error-color: #d63031;
            --success-color: #00b894;
            --border-color: #dfe6e9;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 0;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 100;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 i {
            font-size: 1.2rem;
        }

        .chat-icon {
            background-color: var(--primary-color);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .chat-icon:hover {
            background-color: #5648d3;
            transform: translateY(-5px);
        }

        .chat-window {
            position: fixed;
            bottom: 90px;
            right: 30px;
            width: 360px;
            background-color: var(--card-color);
            border-radius: 10px;
            box-shadow: var(--shadow);
            display: none;
            flex-direction: column;
            max-height: 600px;
            z-index: 999;
        }

        .chat-header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .chat-header button {
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .chat-header button:hover {
            color: #ff7675;
        }

        .chat-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .message.user {
            background-color: #e1e1e1;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .message.bot {
            background-color: #dfe6e9;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid var(--border-color);
        }

        .chat-input input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
            font-size: 0.9rem;
        }

        .chat-input button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .chat-input button:hover {
            background-color: #5648d3;
        }

        .analysis-settings {
            background-color: var(--card-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .analysis-settings h2 {
            color: white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .analysis-settings h2 i {
            font-size: 1.1rem;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group select, .form-group input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        .form-group select:focus, .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(108, 92, 231, 0.3);
        }

        .analyze-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            align-self: flex-start;
            margin-top: 10px;
        }

        .analyze-btn:hover {
            background-color: #5648d3;
        }

        .stock-info {
            background-color: var(--card-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .stock-info h2 {
            color: white;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .info-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .info-card h3 {
            font-size: 0.9rem;
            font-weight: 400;
            margin-bottom: 5px;
        }

        .info-card p {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 5px 0;
        }

        .info-card small {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .signal-section {
            background-color: var(--card-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .signal-section h2 {
            color: white;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .signal-content {
            text-align: center;
            padding: 20px;
            background-color: #f1f2f6;
            border-radius: 8px;
        }

        .signal-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .signal-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .signal-confidence {
            font-size: 0.9rem;
            color: #636e72;
            margin-bottom: 15px;
        }

        .alpha-factors {
            background-color: var(--card-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .alpha-factors h2 {
            color: white;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        .factors-table {
            width: 100%;
            border-collapse: collapse;
        }

        .factors-table th, .factors-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }

        .factors-table th {
            background-color: #f1f2f6;
            font-weight: 500;
            color: #2d3436;
        }

        .factors-table tr:last-child td {
            border-bottom: none;
        }

        .loading {
            text-align: center;
            color: #636e72;
            font-size: 0.9rem;
            margin: 20px 0;
            display: none;
        }

        .error-message {
            color: var(--error-color);
            background-color: #ffeaa7;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            .settings-grid {
                grid-template-columns: 1fr;
            }
            .analyze-btn {
                width: 100%;
            }
            .info-grid {
                grid-template-columns: 1fr;
            }
            .chat-window {
                width: 100%;
                bottom: 0;
                right: 0;
                border-radius: 10px 10px 0 0;
                max-height: 80vh;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><i class="fas fa-robot"></i> AI 股票分析系統</h1>
        </div>
    </header>

    <div class="container">
        <!-- 分析設置 -->
        <section class="analysis-settings">
            <h2><i class="fas fa-cogs"></i> 分析設置</h2>
            <div class="settings-grid">
                <div class="form-group">
                    <label for="market"><i class="fas fa-globe-asia"></i> 選擇市場</label>
                    <select id="market">
                        <option value="hk">港股市場</option>
                        <option value="us">美股市場</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="stock"><i class="fas fa-chart-line"></i> 選擇股票</label>
                    <select id="stock">
                        <option value="0700.HK">騰訊控股 (0700.HK)</option>
                        <option value="0005.HK">匯豐控股 (0005.HK)</option>
                        <option value="9988.HK">阿里巴巴 (9988.HK)</option>
                        <option value="0941.HK">中国移动 (0941.HK)</option>
                        <option value="0388.HK">港交所 (0388.HK)</option>
                        <option value="AAPL">Apple (AAPL)</option>
                        <option value="MSFT">Microsoft (MSFT)</option>
                        <option value="GOOGL">Google (GOOGL)</option>
                        <option value="AMZN">Amazon (AMZN)</option>
                        <option value="TSLA">Tesla (TSLA)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="days"><i class="fas fa-calendar-days"></i> 預測天數</label>
                    <input type="number" id="days" value="30" min="1" max="365">
                </div>
                <div class="form-group">
                    <label for="period"><i class="fas fa-history"></i> 數據週期</label>
                    <select id="period">
                        <option value="1y">1 年</option>
                        <option value="6m">6 個月</option>
                        <option value="3m">3 個月</option>
                        <option value="1m">1 個月</option>
                        <option value="5y">5 年</option>
                    </select>
                </div>
            </div>
            <button class="analyze-btn" onclick="analyzeStock()">
                <i class="fas fa-rocket"></i> 開始 AI 分析
            </button>
        </section>

        <!-- 股票信息 -->
        <section class="stock-info" id="stockInfo">
            <h2><i class="fas fa-info-circle"></i> 股票信息</h2>
            <div class="info-grid">
                <div class="info-card">
                    <h3>當前價格</h3>
                    <p id="currentPrice">$434.62</p>
                    <small id="priceChange">+7.73 (+1.78%)</small>
                </div>
                <div class="info-card">
                    <h3>波動率</h3>
                    <p id="volatility">26.84%</p>
                    <small>年化波動率</small>
                </div>
                <div class="info-card">
                    <h3>RSI 指標</h3>
                    <p id="rsi">40.00</p>
                    <small id="rsiStatus">正常</small>
                </div>
                <div class="info-card">
                    <h3>成交量</h3>
                    <p id="volume">14.16M</p>
                    <small>ATR: 6.66</small>
                </div>
            </div>
        </section>

        <!-- AI 交易信號 -->
        <section class="signal-section" id="signalSection">
            <h2><i class="fas fa-bolt"></i> AI 交易信號</h2>
            <div class="signal-content">
                <i class="fas fa-question-circle signal-icon"></i>
                <div class="signal-text" id="signalText">等待分析...</div>
                <div class="signal-confidence" id="confidence">信心水平: N/A</div>
            </div>
        </section>

        <!-- Alpha 因子 -->
        <section class="alpha-factors" id="alphaFactors">
            <h2><i class="fas fa-chart-pie"></i> Alpha 因子分析</h2>
            <div class="loading" id="alphaLoading">正在計算 Alpha 因子...</div>
            <table class="factors-table">
                <thead>
                    <tr>
                        <th>因子名稱</th>
                        <th>數值</th>
                        <th>狀態</th>
                    </tr>
                </thead>
                <tbody id="factorsBody">
                    <tr>
                        <td colspan="3" style="text-align: center; color: #636e72;">無數據</td>
                    </tr>
                </tbody>
            </table>
            <div class="error-message" id="alphaError"></div>
        </section>
    </div>

    <!-- 聊天窗口 -->
    <div class="chat-icon" onclick="toggleChat()">
        <i class="fas fa-comments"></i>
    </div>

    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <h3><i class="fas fa-robot"></i> AI 助手</h3>
            <button onclick="toggleChat()"><i class="fas fa-times"></i></button>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="message bot">
                您好！我是 AI 股票分析助手，有什麼可以幫您？
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="輸入您的問題..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // --- 基礎變量 ---
        const API_BASE_URL = '/api/alpha'; // 後端 API 路徑
        let currentTicker = '0700.HK'; // 當前股票代碼
        let currentMarket = 'hk'; // 當前市場

        // --- 初始化 ---
        function init() {
            // 綁定市場選擇事件
            document.getElementById('market').addEventListener('change', function() {
                currentMarket = this.value;
                updateStockOptions();
            });

            // 綁定股票選擇事件
            document.getElementById('stock').addEventListener('change', function() {
                currentTicker = this.value;
            });

            // 初始化加載當前選中的股票
            currentTicker = document.getElementById('stock').value;
            currentMarket = document.getElementById('market').value;
        }

        // --- 更新股票選項 ---
        function updateStockOptions() {
            const stockSelect = document.getElementById('stock');
            stockSelect.innerHTML = ''; // 清空選項

            if (currentMarket === 'hk') {
                // 港股選項
                const hkStocks = [
                    { value: '0700.HK', text: '騰訊控股 (0700.HK)' },
                    { value: '0005.HK', text: '匯豐控股 (0005.HK)' },
                    { value: '9988.HK', text: '阿里巴巴 (9988.HK)' },
                    { value: '0941.HK', text: '中国移动 (0941.HK)' },
                    { value: '0388.HK', text: '港交所 (0388.HK)' }
                ];
                hkStocks.forEach(stock => {
                    const option = document.createElement('option');
                    option.value = stock.value;
                    option.text = stock.text;
                    stockSelect.appendChild(option);
                });
            } else {
                // 美股選項
                const usStocks = [
                    { value: 'AAPL', text: 'Apple (AAPL)' },
                    { value: 'MSFT', text: 'Microsoft (MSFT)' },
                    { value: 'GOOGL', text: 'Google (GOOGL)' },
                    { value: 'AMZN', text: 'Amazon (AMZN)' },
                    { value: 'TSLA', text: 'Tesla (TSLA)' }
                ];
                usStocks.forEach(stock => {
                    const option = document.createElement('option');
                    option.value = stock.value;
                    option.text = stock.text;
                    stockSelect.appendChild(option);
                });
            }
        }

        // --- 分析股票 ---
        function analyzeStock() {
            const ticker = document.getElementById('stock').value;
            const days = document.getElementById('days').value;
            const period = document.getElementById('period').value;

            if (!ticker) {
                alert('請選擇股票代碼！');
                return;
            }

            // 顯示加載狀態
            showLoading();

            // 獲取 Alpha 因子數據
            fetchAlphaData(ticker, days, period);
        }

        // --- 顯示加載狀態 ---
        function showLoading() {
            document.getElementById('alphaLoading').style.display = 'block';
            document.getElementById('alphaError').style.display = 'none';
            document.getElementById('factorsBody').innerHTML = '<tr><td colspan="3" style="text-align: center; color: #636e72;">正在加載...</td></tr>';
        }

        // --- 獲取 Alpha 因子數據 ---
        function fetchAlphaData(ticker, days, period) {
            const url = `${API_BASE_URL}?ticker=${ticker}&days=${days}&period=${period}`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    hideLoading();
                    if (data.error) {
                        showError(data.error);
                    } else {
                        renderAlphaFactors(data);
                        updateStockInfo(data);
                        updateSignal(data);
                    }
                })
                .catch(error => {
                    hideLoading();
                    showError('無法獲取數據，請稍後再試。');
                    console.error('Fetch error:', error);
                });
        }

        // --- 隱藏加載狀態 ---
        function hideLoading() {
            document.getElementById('alphaLoading').style.display = 'none';
        }

        // --- 顯示錯誤 ---
        function showError(message) {
            const errorDiv = document.getElementById('alphaError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // --- 渲染 Alpha 因子 ---
        function renderAlphaFactors(data) {
            const factorsBody = document.getElementById('factorsBody');
            factorsBody.innerHTML = ''; // 清空表格

            const factors = data.alpha_factors || {};
            if (Object.keys(factors).length === 0) {
                factorsBody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #636e72;">無 Alpha 因子數據</td></tr>';
                return;
            }

            Object.keys(factors).forEach(factor => {
                const value = factors[factor];
                const status = getValueStatus(value);
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${factor}</td>
                    <td>${formatValue(value)}</td>
                    <td>${status}</td>
                `;
                factorsBody.appendChild(row);
            });
        }

        // --- 格式化數值 ---
        function formatValue(value) {
            if (typeof value === 'number') {
                return value.toFixed(2);
            }
            return value;
        }

        // --- 獲取數值狀態 ---
        function getValueStatus(value) {
            if (typeof value !== 'number') return '正常';

            if (value > 0.5) return '<span style="color: green;">強勢</span>';
            if (value < -0.5) return '<span style="color: red;">弱勢</span>';
            return '正常';
        }

        // --- 更新股票信息 ---
        function updateStockInfo(data) {
            const info = data.stock_info || {};
            document.getElementById('currentPrice').textContent = formatCurrency(info.price);
            document.getElementById('priceChange').textContent = formatChange(info.change);
            document.getElementById('volatility').textContent = formatPercent(info.volatility);
            document.getElementById('rsi').textContent = formatValue(info.rsi);
            document.getElementById('rsiStatus').textContent = getRsiStatus(info.rsi);
            document.getElementById('volume').textContent = formatVolume(info.volume);
        }

        // --- 格式化貨幣 ---
        function formatCurrency(value) {
            if (typeof value !== 'number') return '$N/A';
            return `$${value.toFixed(2)}`;
        }

        // --- 格式化變動 ---
        function formatChange(change) {
            if (typeof change !== 'number') return 'N/A';
            const sign = change >= 0 ? '+' : '';
            return `${sign}${change.toFixed(2)} (${sign}${((change / 100) * 100).toFixed(2)}%)`;
        }

        // --- 格式化百分比 ---
        function formatPercent(value) {
            if (typeof value !== 'number') return 'N/A';
            return `${(value * 100).toFixed(2)}%`;
        }

        // --- 獲取 RSI 狀態 ---
        function getRsiStatus(rsi) {
            if (typeof rsi !== 'number') return '正常';
            if (rsi > 70) return '超買';
            if (rsi < 30) return '超賣';
            return '正常';
        }

        // --- 格式化成交量 ---
        function formatVolume(value) {
            if (typeof value !== 'number') return 'N/A';
            if (value >= 1e6) return `${(value / 1e6).toFixed(2)}M`;
            if (value >= 1e3) return `${(value / 1e3).toFixed(2)}K`;
            return value.toString();
        }

        // --- 更新交易信號 ---
        function updateSignal(data) {
            const signal = data.signal || {};
            const signalText = document.getElementById('signalText');
            const confidence = document.getElementById('confidence');

            signalText.innerHTML = `<strong>${signal.action || '持有'}</strong>`;
            confidence.textContent = `信心水平: ${formatPercent(signal.confidence)}`;
        }

        // --- 切換聊天窗口 ---
        function toggleChat() {
            const chatWindow = document.getElementById('chatWindow');
            chatWindow.style.display = chatWindow.style.display === 'flex' ? 'none' : 'flex';
        }

        // --- 發送消息 ---
        function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;

            // 添加用戶消息
            addMessage('user', message);
            input.value = '';

            // 模擬 AI 回覆
            setTimeout(() => {
                addMessage('bot', '這是一個模擬回覆。實際應用中，這裡會調用 AI API。');
            }, 1000);
        }

        // --- 添加消息 ---
        function addMessage(sender, message) {
            const chatBody = document.getElementById('chatBody');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = message;
            chatBody.appendChild(messageDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        // --- 處理按鍵事件 ---
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // --- 初始化 ---
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
